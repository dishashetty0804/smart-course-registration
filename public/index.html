<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduRegister — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0d0d14;
      --paper: #f5f3ef;
      --accent: #e84c1e;
      --accent2: #2563eb;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
    }

    .left-panel {
      width: 45%;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .left-panel::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,76,30,0.3), transparent 70%);
      pointer-events: none;
    }
    .left-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -60px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.25), transparent 70%);
      pointer-events: none;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }
    .hero-text {
      z-index: 1;
    }
    .hero-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .hero-text h1 em {
      font-style: normal;
      color: var(--accent);
    }
    .hero-text p {
      color: rgba(255,255,255,0.55);
      margin-top: 1.2rem;
      font-size: 1rem;
      line-height: 1.7;
    }
    .stats-row {
      display: flex;
      gap: 2rem;
      z-index: 1;
    }
    .stat { }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
    }
    .stat-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    .form-card {
      width: 100%;
      max-width: 420px;
    }
    .form-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }
    .form-card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .tab-row {
      display: flex;
      border: 2px solid var(--ink);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.65rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tab-btn.active {
      background: var(--ink);
      color: #fff;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: #fff;
      color: var(--ink);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus { border-color: var(--ink); }

    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .toggle-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .toggle-link a {
      color: var(--accent2);
      font-weight: 500;
      cursor: pointer;
      text-decoration: underline;
    }

    #alert-box {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 1.2rem;
    }
    #alert-box.error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    #alert-box.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }

    #signup-fields { display: none; }

    @media(max-width: 768px) {
      .left-panel { display: none; }
    }
  </style>
</head>
<body>

  <!-- Left Branding Panel -->
  <div class="left-panel">
    <div class="logo">Edu<span>Register</span></div>
    <div class="hero-text">
      <h1>Smart<br>Course<br><em>Registration</em></h1>
      <p>Intelligent scheduling with conflict detection, seat management, and AI-powered course recommendations.</p>
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">Courses</div>
      </div>
      <div class="stat">
        <div class="stat-num">0ms</div>
        <div class="stat-label">Conflicts Missed</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">Accurate</div>
      </div>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="right-panel">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p>Sign in to your account or create one below</p>

      <!-- Role Tabs -->
      <div class="tab-row">
        <button class="tab-btn active" id="tab-student" onclick="setRole('student')">Student</button>
        <button class="tab-btn" id="tab-admin" onclick="setRole('admin')">Admin</button>
      </div>

      <div id="alert-box"></div>

      <!-- Signup fields (student only) -->
      <div id="signup-fields">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@university.edu"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn-primary" id="main-btn" onclick="handleAction()">Sign In</button>

      <div class="toggle-link" id="toggle-link">
        Don't have an account? <a onclick="toggleSignup()">Sign up</a>
      </div>
    </div>
  </div>

<script>
  let currentRole = 'student';
  let isSignup = false;

  function setRole(role) {
    currentRole = role;
    document.getElementById('tab-student').classList.toggle('active', role === 'student');
    document.getElementById('tab-admin').classList.toggle('active', role === 'admin');
    document.getElementById('toggle-link').style.display = role === 'admin' ? 'none' : '';
    if (role === 'admin' && isSignup) toggleSignup();
    clearAlert();
  }

  function toggleSignup() {
    isSignup = !isSignup;
    const sf = document.getElementById('signup-fields');
    const btn = document.getElementById('main-btn');
    const link = document.getElementById('toggle-link');
    sf.style.display = isSignup ? 'block' : 'none';
    btn.textContent = isSignup ? 'CREATE ACCOUNT' : 'SIGN IN';
    link.innerHTML = isSignup
      ? 'Already have an account? <a onclick="toggleSignup()">Sign in</a>'
      : 'Don\'t have an account? <a onclick="toggleSignup()">Sign up</a>';
    clearAlert();
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alert-box');
    box.textContent = msg;
    box.className = type;
    box.style.display = 'block';
  }
  function clearAlert() {
    const box = document.getElementById('alert-box');
    box.style.display = 'none';
  }

  async function handleAction() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) return showAlert('Email and password required', 'error');

    if (isSignup && currentRole === 'student') {
      const name = document.getElementById('signup-name').value.trim();
      if (!name) return showAlert('Name is required', 'error');

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert(data.error, 'error');
      showAlert('Account created! Signing you in...', 'success');
      setTimeout(() => login(email, password), 800);
    } else {
      login(email, password);
    }
  }

  async function login(email, password) {
    email = email || document.getElementById('email').value.trim();
    password = password || document.getElementById('password').value.trim();

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) return showAlert(data.error, 'error');

    localStorage.setItem('user', JSON.stringify(data.user));
    if (data.user.role === 'admin') {
      window.location.href = '/admin.html';
    } else {
      window.location.href = '/dashboard.html';
    }
  }

  // Auto-redirect if already logged in
  const stored = localStorage.getItem('user');
  if (stored) {
    const u = JSON.parse(stored);
    window.location.href = u.role === 'admin' ? '/admin.html' : '/dashboard.html';
  }
</script>
</body>
</html>
